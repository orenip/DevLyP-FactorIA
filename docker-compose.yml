version: '3.9'

# FactorIA — Stack de desarrollo completo
# Uso: docker-compose up -d

services:

  # ================================
  # BASE DE DATOS
  # ================================
  db:
    image: postgres:16-alpine
    container_name: factoria_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-factoria_db}
      POSTGRES_USER: ${DB_USER:-factoria_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localpassword}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-factoria_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # CACHE
  # ================================
  redis:
    image: redis:7-alpine
    container_name: factoria_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # BACKEND API
  # ================================
  backend:
    build:
      context: ./backend
      dockerfile: ../deployment/docker/backend.Dockerfile
      target: development
    container_name: factoria_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-factoria_user}:${DB_PASSWORD:-localpassword}@db:5432/${DB_NAME:-factoria_db}
      - REDIS_URL=redis://redis:6379
      - APP_ENV=${APP_ENV:-development}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-secret-key}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ================================
  # FRONTEND
  # ================================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deployment/docker/frontend.Dockerfile
      target: development
    container_name: factoria_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

  # ================================
  # NGINX (reverse proxy)
  # ================================
  nginx:
    image: nginx:alpine
    container_name: factoria_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    profiles:
      - production  # Solo activo con: docker-compose --profile production up

  # ================================
  # ADMINER (UI base de datos, solo dev)
  # ================================
  adminer:
    image: adminer:latest
    container_name: factoria_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: factoria_network
